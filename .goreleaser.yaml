# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: cohesion
dist: dist/release

before:
  hooks:
    - pnpm -C apps/frontend build
    - node apps/backend/scripts/prepare-web-dist.js

builds:
  - id: backend
    dir: ./apps/backend
    main: .
    binary: cohesion
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=production
    ldflags:
      - -s -w -X main.goEnv=production -X main.appVersion={{.Version}} -X main.appCommit={{.Commit}} -X main.appBuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
  - id: updater
    dir: ./apps/backend
    main: ./cmd/updater
    binary: cohesion-updater
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: backend
    ids:
      - backend
      - updater
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ if eq .Os \"darwin\" }}apple_{{ .Os }}{{ else }}{{ .Os }}{{ end }}_{{ .Arch }}"
    files:
      - README.md
      - src: apps/backend/config/config.prod.yaml
        dst: config/config.prod.yaml
      - src: apps/backend/scripts/release/install-cohesion.sh
        dst: install.sh
      - src: apps/backend/scripts/release/cohesion.service
        dst: cohesion.service
      - src: apps/backend/scripts/release/stop-cohesion.command
        dst: stop-cohesion.command
      - src: apps/backend/scripts/release/stop-cohesion.bat
        dst: stop-cohesion.bat

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

nfpms:
  - id: linux-packages
    ids:
      - backend
    package_name: cohesion
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/lteawoo/Cohesion
    maintainer: Taeu Lee
    description: |-
      Self-hosted file service for browsing and sharing files.
    license: AGPL-3.0-only
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/cohesion/README.md
      - src: apps/backend/config/config.prod.yaml
        dst: /usr/share/cohesion/config.prod.yaml
      - src: apps/backend/scripts/release/cohesion-package.service
        dst: /lib/systemd/system/cohesion.service
        packager: deb
      - src: apps/backend/scripts/release/cohesion-package.service
        dst: /usr/lib/systemd/system/cohesion.service
        packager: rpm
    scripts:
      postinstall: apps/backend/scripts/release/package/postinstall.sh
      postremove: apps/backend/scripts/release/package/postremove.sh
